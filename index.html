        document.getElementById("filterOpenNow").onchange = refreshFilters;
        document.getElementById("filterFree").onchange = refreshFilters;
        document.getElementById("poolTypeChooser").onchange = refreshFilters;

        function refreshFilters() {
            onlyOpenNow = document.getElementById("filterOpenNow").checked;
            onlyFree = document.getElementById("filterFree").checked;
            searchTerms = document.getElementById("search_input").value.toLowerCase().trim().split(" ");

            const checkedType = document.querySelector('#poolTypeChooser input[type="radio"]:checked');
            const selectedPoolType = checkedType ? checkedType.value : 'all';

            Array.from(document.getElementById("card-container").children).forEach(function (card) {
                if (selectedPoolType !== 'all' && !(card.dataset.poolTypes || '').split(',').includes(selectedPoolType)) {
                    card.style.display = "none";
                } else if (onlyOpenNow && card.querySelector(".openbadge").innerText != "OPEN") {
                    card.style.display = "none";
                } else if (onlyFree && card.querySelector(".ispoolfree").innerText != "Free for everyone") {
                    card.style.display = "none";
                } else {
                    card.style.display = "";
                    for (i = 0; i < searchTerms.length; i++) {
                        if (card.innerText.toLowerCase().indexOf(searchTerms[i]) == -1) {
                            card.style.display = "none";
                        }
                    }
                }
            });
            if (typeof syncMapToCurrentFilters === 'function') syncMapToCurrentFilters();
            if (typeof updateLocationResultsCount === 'function') updateLocationResultsCount();
        }


        let cardContainer;
        let createCard = (pool) => {
            let card = document.createElement('div');
            card.className = 'card text-bg-light mb-3';
            card.dataset.poolName = pool["Pool"];
            card.dataset.poolTypes = pool["Pool Type"].split(',').map(t => t.trim() === 'Wading' ? 'Wading Pool' : t.trim()).join(',');

            let cardBody = document.createElement('div');
            cardBody.className = 'card-body';

            let title = document.createElement('h5');
            title.innerText = pool["Pool"] + " ";
            title.className = 'card-title';
            if (typeof makeDistanceElement === 'function') {
                const distEl = makeDistanceElement(pool);
                if (distEl) title.appendChild(distEl);
            }

            title.appendChild(generateOpenBadge(pool));

            let text = document.createElement('div');
            text.className = 'card-text container text-left';

            let row = document.createElement('div');
            row.className = 'row';

            let location = document.createElement('div');
            location.className = 'col-12 col-md-4 pb-1';
            let l1 = document.createElement('div');
            l1.style = 'font-weight: bold';
            l1.innerText = "Location";
            let l2 = document.createElement('div');
            l2.innerText = pool["Neighborhood"] + " ";
            boroughname = document.createElement('span');
            boroughname.className = "pool_borough"
            boroughname.innerText = "(" + pool["Borough"] + ")";
            l2.appendChild(boroughname);
            let l3 = document.createElement('div');
            l3.innerText = pool["Address"];
            let l4 = makeSubwayElement(pool['Closest subways']);

            location.appendChild(l1);
            location.appendChild(l2);
            location.appendChild(l3);
            location.appendChild(l4);
            row.appendChild(location);


            let type = document.createElement('div');
            type.className = 'col-12 col-md-4 pb-1';
            let t1 = document.createElement('div');
            t1.style = 'font-weight: bold';
            t1.innerText = "Type";
            let t2 = document.createElement('div');
            t2.innerText = pool["Outdoor or Indoor"] + " Pool";
            let t3 = document.createElement('div');
            t3.innerText = pool["Pool Type"].replace(",", " & ").replace("Intermediate", "Intermediate Size");
            let t4 = document.createElement('div');
            t4.className = "ispoolfree"
            t4.innerText = pool["Availability"] == "Public" ? "Free for everyone" : "Membership required ($$)";
            type.appendChild(t1);
            type.appendChild(t2);
            type.appendChild(t3);
            type.appendChild(t4);
            row.appendChild(type);

            let hours = document.createElement('div');
            hours.className = 'col-12 col-md-4 pb-1';
            let h1 = document.createElement('div');
            h1.style = 'font-weight: bold';
            h1.innerText = "Hours";

            hours.appendChild(h1);
            // don't show all this info if pool is closed all summere
            if (pool["Weekday Open Time"].toLowerCase().indexOf("closed") != -1) {
                let h2 = document.createElement('div');
                h2.innerText = pool["Weekday Open Time"] + " 😔";
                hours.appendChild(h2);
            } else {
                weekdayHours = handleHours(pool["Weekday Open Time"], pool["Weekday Close Time"]);
                saturdayHours = handleHours(pool["Saturday Open Time"], pool["Saturday Close Time"]);
                sundayHours = handleHours(pool["Sunday Open Time"], pool["Sunday Close Time"]);
                // if time is the same every day, only show it once
                if ((weekdayHours == saturdayHours) && (saturdayHours == sundayHours)) {
                    let h2 = document.createElement('div');
                    h2.innerText = "Daily: " + weekdayHours;
                    hours.appendChild(h2);
                } else {
                    let h2 = document.createElement('div');
                    let h3 = document.createElement('div');
                    let h4 = document.createElement('div');
                    h2.innerText = "Weekdays: " + weekdayHours;
                    h3.innerText = "Saturday: " + saturdayHours;
                    h4.innerText = "Sunday: " + sundayHours;
                    hours.appendChild(h2);
                    hours.appendChild(h3);
                    hours.appendChild(h4);
                }
                let h5 = document.createElement('div');
                h5.innerText = "Cleaning: " + handleHours(pool["Cleaning Start Time"], pool["Cleaning End Time"]);
                hours.appendChild(h5);
            }
            // link to website to right column — hidden on mobile (shown as its own row below)
            let h6 = document.createElement('div');
            h6.className = 'd-none d-md-block';
            el = document.createElement('a');
            el.innerText = "Google Maps";
            el.href = pool["Google map link"];
            el.target = "_blank";
            h6.appendChild(el);
            hours.appendChild(h6);
            row.appendChild(hours);

            // mobile-only Google Maps row (appears between Hours and source link)
            const mobileGmaps = document.createElement('div');
            mobileGmaps.className = 'd-md-none';
            mobileGmaps.style.cssText = 'padding: 4px 0 2px;';
            const mobileGmapsLink = document.createElement('a');
            mobileGmapsLink.innerText = "Google Maps";
            mobileGmapsLink.href = pool["Google map link"];
            mobileGmapsLink.target = "_blank";
            mobileGmaps.appendChild(mobileGmapsLink);

            cardBody.appendChild(title);

            text.appendChild(row);
            text.appendChild(mobileGmaps);
            cardBody.appendChild(text);

            card.appendChild(cardBody);

            if (pool["Source info"]) {
                const divider = document.createElement('div');
                divider.style.cssText = 'border-top: 1px solid #dee2e6; margin: 0 1rem;';
                const sourceFooter = document.createElement('div');
                sourceFooter.style.cssText = 'padding: 6px 1rem 8px;';
                const sourceLink = document.createElement('a');
                sourceLink.href = pool["Source info"];
                sourceLink.target = '_blank';
                sourceLink.rel = 'noopener';
                sourceLink.style.cssText = 'font-size: 12px; color: #6c757d; text-decoration: none;';
                const sourceLabel = pool["Source label"] || "NYC Parks";
                sourceLink.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:3px;vertical-align:middle"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' + sourceLabel;
                sourceFooter.appendChild(sourceLink);
                card.appendChild(divider);
                card.appendChild(sourceFooter);
            }

            cardContainer.appendChild(card);

        }

        function generateOpenBadge(pool) {
            let openbadge = document.createElement("span");
            openbadge.className = "badge openbadge";
            openbadge.innerText = isPoolOpen(pool);
            if (openbadge.innerText == "OPEN") {
                openbadge.className += " text-bg-success";
            } else if (openbadge.innerText == "CLOSED") {
                openbadge.className += " text-bg-danger";
            } else {
                openbadge.className += " text-bg-info";
            }
            return openbadge;
        }

        var SUBWAY_COLORS = {
            1: 'red',
            2: 'red',
            3: 'red',
            4: 'green',
            5: 'green',
            6: 'green',
            7: 'purple',
            "A": 'blue',
            "C": 'blue',
            "E": 'blue',
            "B": 'orange',
            "D": 'orange',
            "F": 'orange',
            "M": 'orange',
            "G": 'green-2',
            "N": 'yellow',
            "Q": 'yellow',
            "R": 'yellow',
            "W": 'yellow',
            "L": 'gray',
            "J": 'brown',
            "Z": 'brown',
            "Staten Island Railway": "sir",
        }

        function makeSubwayElement(subwaydata) {
            let l4 = document.createElement('div');
            subways = subwaydata.split(",").sort();
            l4.innerText = "Subway: ";
            if (subways[0] == "") {
                l4.innerText += "N/A"
            } else if (subways[0] == "Staten Island Railway") {
                circle = document.createElement('span');
                circle.className = 'badge rounded-pill';
                circle.style = "background-color: #0078C6";
                circle.innerText = "SIR";
                l4.appendChild(circle);
            } else {
                for (i = 0; i < subways.length; i++) {
                    circle = document.createElement('span');
                    circle.className = 'subway-icon mta-' + SUBWAY_COLORS[subways[i]];
                    circle.innerText = subways[i];
                    spacer = document.createElement('span');
                    spacer.innerText = " ";
                    l4.appendChild(circle);
                    l4.appendChild(spacer);
                }
            }
            return l4;
        }

        function poolClosedAllDay(text) {
            text = text.toLowerCase();
            if ((text.indexOf("close") != -1) || (text.indexOf("n/a") != -1) || (text.length == 0)) {
                return true;
            }
            return false;
        }

        function handleHours(open, close) {
            if (poolClosedAllDay(open)) {
                return open;
            }
            output = "";
            output += (+open.split(":")[0] % 12).toString();
            if (open.split(":")[1] != "00") {
                output += ":" + open.split(":")[1];
            }
            output += (+open.split(":")[0] < 12 ? "am" : "pm");
            output += "-";
            output += (+close.split(":")[0] % 12).toString();
            if (close.split(":")[1] != "00") {
                output += ":" + close.split(":")[1];
            }
            output += (+close.split(":")[0] < 12 ? "am" : "pm");
            return output;
        }

        function isTime1BeforeTime2(t1, t2) {
            return (+t1.split(":")[0] * 100 + (+t1.split(":")[1])) < (+t2.split(":")[0] * 100 + (+t2.split(":")[1]));
        }

        function isPoolOpen(pool) {
            dateObj = new Date();

            // for testing
            // dateObj.setDate(29)
            // dateObj.setHours(18);
            // dateObj.setMinutes(59);

            curDay = dateObj.getDay();
            curTime = dateObj.getHours().toString() + ":" + dateObj.getMinutes().toString();

            let day = "Weekday";
            if (curDay == 0) {
                day = "Sunday";
            } else if (curDay == 6) {
                day = "Saturday";
            }

            openTime = pool[day + " Open Time"];
            closeTime = pool[day + " Close Time"];
            cleanStart = pool["Cleaning Start Time"];
            cleanEnd = pool["Cleaning End Time"];

            // closed all day?
            if (poolClosedAllDay(openTime)) {
                return "CLOSED";
            }
            // too early?
            if (isTime1BeforeTime2(curTime, openTime)) {
                return "CLOSED";
            }
            // too late?
            if (!isTime1BeforeTime2(curTime, closeTime)) {
                return "CLOSED";
            }
            // cleaning time?
            if (!isTime1BeforeTime2(curTime, cleanStart) && isTime1BeforeTime2(curTime, cleanEnd)) {
                return "CLEANING";
            }
            return "OPEN";
        }

        let generatePools = () => {
            // if (cardContainer) {
            //     document.getElementById('card-container').replaceWith(cardContainer);
            //     return;
            // }

            pooldata.sort((a, b) => a["Borough"].localeCompare(b["Borough"]) || a["Pool"].localeCompare(b["Pool"]));

            cardContainer = document.getElementById('card-container');
            pooldata.forEach((pool) => { createCard(pool) });
        };

        generatePools();

        function generatePoolTypePills() {
            const typeSet = new Set();
            pooldata.forEach(pool => {
                pool["Pool Type"].split(',').forEach(t => {
                    const normalized = t.trim() === 'Wading' ? 'Wading Pool' : t.trim();
                    if (normalized) typeSet.add(normalized);
                });
            });
            const ORDER = ['Olympic Size', 'Intermediate', 'Mini Pool', 'Wading Pool', 'Diving Pool'];
            const types = [...ORDER.filter(t => typeSet.has(t)), ...Array.from(typeSet).filter(t => !ORDER.includes(t)).sort()];

            const chooser = document.getElementById('poolTypeChooser');
            chooser.innerHTML = '';

            ['All', ...types].forEach((type, i) => {
                const value = i === 0 ? 'all' : type;
                const id = 'pooltype_' + value.replace(/\s+/g, '_').toLowerCase();
                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'pooltype';
                input.className = 'btn-check';
                input.id = id;
                input.value = value;
                input.autocomplete = 'off';
                if (i === 0) input.checked = true;
                const label = document.createElement('label');
                label.className = 'btn btn-outline-light';
                label.htmlFor = id;
                label.textContent = i === 0 ? 'All' : type;
                chooser.appendChild(input);
                chooser.appendChild(label);
            });
        }
        generatePoolTypePills();

        // ─── Mobile filter setup ──────────────────────────────────────────────────

        function generateMobilePoolTypePills() {
            const typeSet = new Set();
            pooldata.forEach(pool => {
                pool["Pool Type"].split(',').forEach(t => {
                    const n = t.trim() === 'Wading' ? 'Wading Pool' : t.trim();
                    if (n) typeSet.add(n);
                });
            });
            const ORDER = ['Olympic Size', 'Intermediate', 'Mini Pool', 'Wading Pool', 'Diving Pool'];
            const types = ['All', ...ORDER.filter(t => typeSet.has(t)), ...Array.from(typeSet).filter(t => !ORDER.includes(t)).sort()];
            const VISIBLE = 4;

            const container = document.getElementById('poolTypePillsMobile');
            container.innerHTML = '';
            types.forEach((type, i) => {
                const value = i === 0 ? 'all' : type;
                const id = 'mob_pt_' + value.replace(/\W+/g, '_').toLowerCase();
                const inp = document.createElement('input');
                inp.type = 'radio';
                inp.name = 'mob-pooltype';
                inp.className = 'btn-check';
                inp.id = id;
                inp.value = value;
                inp.autocomplete = 'off';
                if (i === 0) inp.checked = true;
                inp.addEventListener('change', () => {
                    const desk = document.querySelector(`#poolTypeChooser input[value="${value}"]`);
                    if (desk) desk.checked = true;
                    refreshFilters();
                });
                const lbl = document.createElement('label');
                lbl.className = 'btn btn-outline-light btn-sm flex-shrink-0';
                lbl.htmlFor = id;
                lbl.textContent = type;
                if (i >= VISIBLE) lbl.classList.add('mob-pill-overflow', 'd-none');
                container.appendChild(inp);
                container.appendChild(lbl);
            });

            const overflow = Math.max(0, types.length - VISIBLE);
            const btn = document.getElementById('mob-overflow-btn');
            if (overflow > 0) {
                btn.textContent = '+' + overflow;
                btn.style.display = '';
            }
        }

        let _mobPillsExpanded = false;
        function toggleMobilePillOverflow() {
            _mobPillsExpanded = !_mobPillsExpanded;
            const container = document.getElementById('poolTypePillsMobile');
            const btn = document.getElementById('mob-overflow-btn');
            const overflowLabels = container.querySelectorAll('label.mob-pill-overflow');

            if (_mobPillsExpanded) {
                overflowLabels.forEach(el => el.classList.remove('d-none'));
                container.style.flexWrap = 'wrap';
                container.style.overflow = 'visible';
                btn.textContent = '✕';
            } else {
                overflowLabels.forEach(el => el.classList.add('d-none'));
                container.style.flexWrap = 'nowrap';
                container.style.overflow = 'hidden';
                btn.textContent = '+' + overflowLabels.length;
            }
        }

        document.getElementById('mob-filterOpenNow').addEventListener('change', function () {
            document.getElementById('filterOpenNow').checked = this.checked;
            refreshFilters();
        });
        document.getElementById('mob-filterFree').addEventListener('change', function () {
            document.getElementById('filterFree').checked = this.checked;
            refreshFilters();
        });
        document.getElementById('mob-radius-select').addEventListener('change', function () {
            document.getElementById('radius-select').value = this.value;
            if (typeof locationFilter !== 'undefined' && locationFilter) {
                applyLocationSearch(locationFilter.lat, locationFilter.lng);
            }
        });

        // Sync initial radius value (session restore may have set it)
        document.getElementById('mob-radius-select').value = document.getElementById('radius-select').value;

        // Mobile-appropriate placeholder
        if (window.innerWidth < 768) {
            document.getElementById('location-search-input').placeholder = 'Search by zip or address...';
        }

        generateMobilePoolTypePills();

        refreshFilters();

        function refreshWithCurrentTime() {
            console.log("Refreshing with current time...")
            pooldata.forEach(function (pool) {
                const card = cardContainer.querySelector(`[data-pool-name="${CSS.escape(pool['Pool'])}"]`);
                if (!card) return;
                card.querySelector(".openbadge").replaceWith(generateOpenBadge(pool));
            });
            refreshFilters();
        }
        // refreshes every 60 seconds
        // we replace ~50 DOM elements (OPEN/CLOSED badges) every time
        // idk what's an appropriate amount performance-wise
        setInterval(refreshWithCurrentTime, 1000 * 60)


        // enable popovers
        var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
        var popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
            return new bootstrap.Popover(popoverTriggerEl)
        })

    </script>
